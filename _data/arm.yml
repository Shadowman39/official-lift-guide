lifts:

  - name: Stair-Arm Lift
    author: "[Shadowman39](https://www.instructables.com/member/Shadowman39/)"
    featured: "[Citadel](https://www.instructables.com/Citadel-Knex-Ball-Machine/)"
    category: main
    instructions: https://www.instructables.com/Knex-Stair-Arm-Lift/
    description: This lift is similar to a stair lift, except it uses arms instead of platforms. Since they don't slide on rods, there isn't as much friction, so this stair lift can be made much taller than the original stair lift. It also slants 45° (the old one slants half as much), so it can be made taller in a shorter amount of space. The arms do take up more room though. If it uses an odd number of arms (like the version in Citadel), one of the arms needs a counterweight.
      
