lifts:

  - name: Single Elevator Lift
    author: "[Sorunome](http://www.sorunome.de/)"
    featured: "[Apocalypse](http://www.sorunome.de/knex/ballmachines/apocalypse/)"
    category: main
    video: https://www.youtube.com/watch?v=WiQevg65lCE
    instructions: 
    description: These use a single cart on one end of a pulley system and a counterweight on the other. Sorunome's version uses an elevator cart that holds 8 balls. The up and down motion is controlled by a gearbox that has forward and reverse transmission, similar to the twin elevator lift. Levers switch the gearbox when the elevator gets to the top/bottom. In total, the lift uses 34 gears. The elevator shaft doesn't need tubing like some other designs.
    images:
      - - FYQMTR0HKVKM47V.jpg
        - Sorunome's lift built for Apocalypse
      - - FKCL03JHKVKM47S.jpg
        - The cart that holds 8 balls
      - - FGPESWEHKVKM47R.jpg
        - Balls are loaded in two rows of 4 each. When the first row fills up, the next balls roll over the last one in the first row to get to the second.
      - - F447RUZHKVKM47Y.jpg
        - The counterweight

  - name: Twin Elevator Lift
    author: "[Shadowman39](https://www.instructables.com/member/Shadowman39/)"
    featured: "[Citadel](https://www.instructables.com/Citadel-Knex-Ball-Machine/)"
    category: main
    video: 
    instructions: 
    description: It's more efficient to have the elevators have two carts, and one balances the other out, not needing a counterweight. The first one made for Citadel uses two carts to lift the balls, each one carrying 4 balls. It uses a simple forward/reverse transmission to make them switch direction (the gearbox is located in the base). There are two reels of fishing line, and the reels are easy to adjust, which helps to combat stretching of the fishing line. This lift runs smoother and faster than other designs, but it uses tubing and the layout of the carts means a complex shaft with orange-tabbed connectors and splicers. 

      <div style="text-align:center;">
      <iframe width="90%" height="400" src="https://www.youtube.com/embed/t2ChIcRWzI0?si=ZfkYB3OY6ehC-A4d" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <br>
      A simpler version that uses less pieces and no tubing was made by dickheijboer. The carts each hold 3 balls and the transmission is at the top. It also uses chain which is easier to set up. Plus, this version has [instructions](https://www.instructables.com/id/EQVP22RHVS19501/).
    images:
      - - FAS23RWHLJV036Y.jpg
        - The original version during Citadel's construction
      - - F2B7M2FHLJV037E.jpg
        - One of the carts, which carry two rows of two balls each and has a sliding gate for releasing them at the top
      - - FHYUIY7HLJV037N.jpg
        - The top exit tracks
      - - IMG_0002_2.jpg
        - The core elevator shaft uses a lot of pieces, but these can be made with simpler shaft layouts.
      - - IMG_0002_9.jpg
        - The balls collect at the bottom, inlcuding overflow tracks
      - - F03J8DAHLJV037H.jpg
        - The transmission which controls the elevator direction
      - - FXX1XOZHLJV036Z.jpg
        - The reels of fishing line at the bottom
      - - FXL9C82I2AQU3YU.jpg
        - dickheijboer's version, built for Intertwined
      - - FEOBCAWI2AQU3ZC.jpg
        - The top transmission
